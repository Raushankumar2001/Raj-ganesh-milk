name: Next.js CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: nextjs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run lint
      - name: Run lint
        run: npm run lint

      # Security audit
      - name: Security audit
        run: npm audit --audit-level=high

      # Build Next.js app
      - name: Build application
        run: npm run build

      # Success message
      - name: Success
        run: echo "✅ Next.js CI completed successfully"
