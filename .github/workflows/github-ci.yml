name: Next.js CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

# 🔒 Least privilege
permissions:
  contents: read

# 🚫 Cancel duplicate workflow runs
concurrency:
  group: nextjs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      # 📥 Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚙️ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm ci

      # 🔍 Run ESLint
      - name: Run lint
        run: npm run lint

      # 🔐 Run security audit
      - name: Security audit
        run: npm audit --audit-level=high

      # 🏗️ Build Next.js project
      - name: Build application
        run: npm run build

      # ✅ Success message
      - name: Success
        run: echo "✅ Next.js CI completed successfully"
